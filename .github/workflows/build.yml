 name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3 python3-dev \
            libffi-dev libssl-dev zlib1g-dev liblzma-dev libsqlite3-dev \
            openjdk-17-jdk autoconf libtool pkg-config \
            libltdl-dev libgdbm-dev libbz2-dev
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: TikTokDL-Pro
          path: bin/*.apk
        
